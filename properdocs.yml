site_name: "Mapyta"
site_url: !ENV READTHEDOCS_CANONICAL_URL
repo_url: https://github.com/egarciamendez/mapyta

extra_css:
  - assets/stylesheets/extra.css
  - https://unpkg.com/katex@0/dist/katex.min.css

extra_javascript:
  - assets/javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

copyright: "2026 &copy; Mapyta - Enrique García"

theme:
  name: material
  logo: assets/images/logo-dark-mode.svg
  favicon: assets/images/favicon.ico
  custom_dir: docs/_overrides
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4 
        name: Switch to system preference
  font: 
    text: "DM Sans"
  features:
    # https://squidfunk.github.io/mkdocs-material/reference/code-blocks/?h=code+blocks
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    # https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - toc.follow
    - navigation.top

    - navigation.footer
    # https://squidfunk.github.io/mkdocs-material/setup/setting-up-site-search/
    - search.highlight
    - search.share
    - search.suggest
    # https://squidfunk.github.io/mkdocs-material/setup/setting-up-the-header/
    - announce.dismiss
  language: en

plugins:
  - search
  - open-in-new-tab
  - gen-files:
      scripts:
        - docs/_scripts/generate_reference_pages.py
        - docs/_scripts/generate_index.py
  - mkdocstrings:
      handlers:
        python:
          paths: [./mapyta]
          options:
            show_source: true
            merge_init_into_class: true
            show_signature_annotations: true
            filters:
              - "!^_"
            line_length: 80
            docstring_style: numpy
            separate_signature: true
            show_bases: true
            show_root_heading: true
            show_object_full_path: true
            show_root_full_path: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: true
            summary:
              classes: true
              modules: true
            unwrap_annotated: true
            docstring_section_style: list
            show_if_no_docstring: false
  - awesome-nav


markdown_extensions: 
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.gemoji
      alt: short
  - pymdownx.tasklist:
      custom_checkbox: false
  - pymdownx.superfences:
      custom_fences:
        - name: python
          class: python
          validator: !!python/name:markdown_exec.validator
          format: !!python/name:markdown_exec.formatter
  - admonition
  - pymdownx.details
  - abbr
  - md_in_html
  - attr_list
  - pymdownx.snippets:
      check_paths: true
      base_path: 
        - ./README.md
        - docs
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/engarcia/
    - icon: fontawesome/brands/github
      link: https://github.com/egarciamendez/mapyta
