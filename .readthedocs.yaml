# Read the Docs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    pre_install:
      - pip install uv
    install:
      - uv sync --group docs
    build:
      html:
        - uv run properdocs build --clean
        - mkdir -p $READTHEDOCS_OUTPUT/html
        - cp -r site/* $READTHEDOCS_OUTPUT/html/
