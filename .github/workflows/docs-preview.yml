name: Docs preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - if: github.event.action != 'closed'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - if: github.event.action != 'closed'
        name: Install docs dependencies
        run: uv sync --group docs

      - if: github.event.action != 'closed'
        name: Build docs
        run: uv run properdocs build --clean --strict

      - name: Deploy preview
        if: github.event.action != 'closed'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
          target-folder: pr-preview/pr-${{ github.event.pull_request.number }}
          clean: false

      - name: Comment preview URL
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}/`;
            const body = `## 📖 Docs preview\n\n🔗 ${url}\n\n_Updated on every push. Removed when the PR is closed._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const bot = comments.find(c => c.user.type === 'Bot' && c.body.includes('Docs preview'));
            if (bot) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: bot.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

      - name: Remove preview on close
        if: github.event.action == 'closed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if gh-pages branch doesn't exist yet
          git ls-remote --heads https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git gh-pages \
            | grep -q gh-pages || exit 0
          PR_NUM=${{ github.event.pull_request.number }}
          git clone --depth=1 --branch=gh-pages \
            https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git /tmp/gh-pages
          rm -rf /tmp/gh-pages/pr-preview/pr-${PR_NUM}
          cd /tmp/gh-pages
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --quiet HEAD || git commit -m "chore: remove docs preview for PR #${PR_NUM}"
          git push
